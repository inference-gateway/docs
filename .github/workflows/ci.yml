---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint markdown
        run: bun run lint:md

      - name: Check formatting
        run: bun run format:check

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build

  drift:
    name: Docs drift
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Provider-docs regression tests (offline)
        run: bun test

      - name: Fail on schema drift
        run: |
          bun scripts/generate-provider-docs.mjs
          bunx prettier --write supported-providers.md configuration.md rust-adk.md typescript-adk.md
          git diff --exit-code -- supported-providers.md configuration.md rust-adk.md typescript-adk.md \
            || { echo 'Provider docs drifted from openapi.yaml - run `task generate` and commit.'; exit 1; }
